server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: route every unknown path to index.html so that
    # client-side routes (e.g. /urls, /analytics/:id) work on refresh
    # and deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed asset filenames, so they can be cached
    # aggressively and immutably.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
